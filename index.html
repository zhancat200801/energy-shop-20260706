const originalGoods = [...goods];
let currentSort = 'default';

function render(list) {
    const wrap = document.getElementById('goodsList');
    const stats = document.getElementById('stats');
    stats.textContent = `共 ${list.length} 款商品`;
    
    if (list.length === 0) {
        wrap.innerHTML = '<div class="empty">没有找到相关商品</div>';
        return;
    }
    
    wrap.innerHTML = list.map(item => `
        <div class="card">
            <img class="card-img" src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22260%22 height=%22200%22%3E%3Crect fill=%22%23f0f0f0%22 width=%22260%22 height=%22200%22/%3E%3Ctext fill=%22%23999%22 font-size=%2214%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22%3E商品图片%3C/text%3E%3C/svg%3E'">
            <div class="card-body">
                <div class="card-title">${item.name}${item.hot ? '<span class="highlight-tag">高佣推荐</span>' : ''}</div>
                <div class="price-row">
                    <div class="price"><small>¥</small>${item.price}</div>
                </div>
                <div class="commission">预估佣金 <span class="commission-tag">¥${item.com}</span></div>
                <a class="buy-btn" href="${item.link}" target="_blank" rel="noopener noreferrer">立即购买</a>
            </div>
        </div>
    `).join('');
}

function sortGoods(type) {
    let list = [...originalGoods];
    const kw = document.getElementById('search').value.trim().toLowerCase();
    if (kw) {
        list = list.filter(v => v.name.toLowerCase().includes(kw));
    }
    
    switch(type) {
        case 'price-asc':
            list.sort((a, b) => a.price - b.price);
            break;
        case 'price-desc':
            list.sort((a, b) => b.price - a.price);
            break;
        case 'com-desc':
            list.sort((a, b) => b.com - a.com);
            break;
        default:
            break;
    }
    render(list);
}

// 初始化
render(originalGoods);

// 搜索
document.getElementById('search').addEventListener('input', function() {
    sortGoods(currentSort);
});

// 排序按钮
document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentSort = this.dataset.sort;
        sortGoods(currentSort);
    });
});
</script>
